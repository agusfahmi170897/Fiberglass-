<style>
  html { scroll-behavior: smooth; }
  body { font-family: 'Inter', sans-serif; }
  .font-display { font-family: 'Plus Jakarta Sans', sans-serif; }
  .font-mono { font-family: 'JetBrains Mono', monospace; }

  /* focus ring accessibility */
  a:focus-visible, button:focus-visible, summary:focus-visible, select:focus-visible {
    outline: 2px solid #2E7D32;
    outline-offset: 2px;
    border-radius: 6px;
  }
  .dark a:focus-visible, .dark button:focus-visible, .dark summary:focus-visible, .dark select:focus-visible {
    outline-color: #7ccf94;
  }

  /* hide scrollbar for chip rows */
  .no-scrollbar::-webkit-scrollbar { display: none; }
  .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

  /* FAQ chevron rotate */
  details[open] .faq-chevron { transform: rotate(180deg); }
  summary::-webkit-details-marker { display: none; }

  /* subtle marquee for trust strip */
  @media (prefers-reduced-motion: no-preference) {
    .marquee-track { animation: marquee 26s linear infinite; }
    .marquee-track:hover { animation-play-state: paused; }
  }
  @keyframes marquee {
    0% { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }

  /* decorative sorting-bin chip blobs */
  .chip-blob {
    position: absolute;
    border-radius: 28%;
    filter: blur(0px);
  }

  /* gallery hover zoom, respects reduced motion */
  .gallery-img { transition: transform .5s ease; }
  @media (prefers-reduced-motion: reduce) {
    .gallery-img, .marquee-track, * { transition: none !important; animation: none !important; }
  }

  /* testimonial slide fade */
  .testi-slide { transition: opacity .4s ease; }
</style>
